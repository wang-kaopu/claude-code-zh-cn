name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check PR body auto-close keywords
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-pr-autoclose-keywords.js --body-env PR_BODY

      - name: Run PR preflight
        if: github.event_name == 'pull_request'
        run: bash scripts/preflight.sh --base "${{ github.event.pull_request.base.sha }}" --skip-release-state

      - name: Run main preflight
        if: github.event_name == 'push'
        run: bash scripts/preflight.sh --skip-payload-source --skip-release-state

  windows-install-smoke:
    name: windows-install-smoke (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - windows-2022
          - windows-2025-vs2026
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: PowerShell install smoke
        shell: powershell
        run: node --test tests/install-smoke.test.js

  windows-native-compat:
    name: windows-native-compat
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install native verification dependency
        run: npm install --no-save node-lief

      - name: Verify Windows native support window
        shell: powershell
        run: node scripts/verify-upstream-compat.js --skip-latest --native-windows-x64 --json
